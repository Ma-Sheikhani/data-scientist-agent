# version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ds-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: dsagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d dsagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ds-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../  # repo root
      dockerfile: Dockerfile
    container_name: ds-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app  # mount entire repo for hot reload
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ds-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../../:/app
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  flower:
    image: mher/flower
    command: celery --broker=redis://redis:6379/0 flower
    ports:
      - "5555:5555"
    depends_on:
      - redis

  beat:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ds-beat
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ../../:/app            # live code sync (dev)
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ds-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ds-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_BACKEND=${LLM_BACKEND:-local}
      - OLLAMA_MODEL=phi3:mini
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$$LLM_BACKEND" = "local" ]; then
          echo "Pulling model: $$OLLAMA_MODEL"
          ollama pull $$OLLAMA_MODEL
        else
          echo "Skipping local model pull (LLM_BACKEND=$$LLM_BACKEND)"
        fi
    restart: "no"

  sandbox:
    build:
      context: ../../
      dockerfile: sandbox/Dockerfile
    container_name: ds-sandbox
    ports:
      - "8001:8001"
    environment:
      - MPLCONFIGDIR=/tmp
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
    - upload_data:/app/uploads:ro

volumes:
  postgres_data:
  upload_data:
  ollama_data:
