# version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ds-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: dsagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d dsagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ds-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../  # repo root
      dockerfile: Dockerfile
    container_name: ds-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app  # mount entire repo for hot reload
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ds-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../../:/app
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  flower:
    image: mher/flower
    command: celery flower --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  beat:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ds-beat
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ../../:/app            # live code sync (dev)
      - upload_data:/app/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


volumes:
  postgres_data:
  upload_data:
