global:
  scrape_interval: 15s

rule_files:
  - "/etc/prometheus/alerts/agent_alerts.yml"

scrape_configs:
  - job_name: 'api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
