repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        # language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-docstrings]
        args: ['--max-line-length=150', '--extend-ignore=E203']

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        types: [python]
        args: ["--config-file=pyproject.toml", "."]
        pass_filenames: false
        require_serial: true

  # Run the full test suite (mimics CI)
  - repo: local
    hooks:
      - id: pytest
        name: pytest (docker)
        entry: docker compose -f deployments/docker-compose/docker-compose.yml exec -T api python -m pytest --cov=api --cov=agent --cov=workers --cov-report=term-missing --cov-fail-under=70
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: ^tests/
