name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agentpass
          POSTGRES_DB: dsagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-interaction
      - name: Lint with flake8
        run: poetry run flake8 .
      - name: Check formatting with black
        run: poetry run black --check .
      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://agent:agentpass@localhost:5432/dsagent
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: testsecret
        run: poetry run pytest -v --cov=api --cov=workers --cov-report=xml --cov-fail-under=70


  integration-tests:
    runs-on: ubuntu-latest
    needs: test               # optional – only runs if lint/unit tests pass

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agentpass
          POSTGRES_DB: dsagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-interaction --with dev

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agent:agentpass@localhost:5432/dsagent
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: test-secret-for-ci
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: |
          poetry run pytest tests/ -v --tb=short
